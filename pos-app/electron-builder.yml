appId: com.2xg.pos
productName: 2XG POS
copyright: Copyright © 2026 2XG Growth

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - dist-electron/**/*

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
  hardenedRuntime: true
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  category: public.app-category.business

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 2XG POS

publish:
  provider: github
  owner: 2xggrowth-art
  repo: 2xg-pos-releases
